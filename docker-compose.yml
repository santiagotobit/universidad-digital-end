services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: universidad
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    environment:
      APP_ENV: development
      APP_DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/universidad
      APP_CORS_ORIGINS: "http://localhost,http://localhost:8080,http://127.0.0.1,http://127.0.0.1:8080"
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: http://localhost:8000
    ports:
      - "8080:80"
    depends_on:
      - api

volumes:
  pgdata:
