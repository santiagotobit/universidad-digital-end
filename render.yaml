# Blueprint de Render: Postgres + API (Docker) + sitio estático (Vite).
# En el panel: New > Blueprint y selecciona este repositorio.
# Ajusta planes y variables secretas (APP_JWT_SECRET, VITE_API_BASE_URL) tras el primer despliegue.

databases:
  - name: universidad-db
    databaseName: universidad
    user: universidad

services:
  - type: web
    name: universidad-api
    runtime: docker
    plan: free
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /docs
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DATABASE_URL
        fromDatabase:
          name: universidad-db
          property: connectionString
      - key: APP_JWT_SECRET
        generateValue: true
      - key: APP_CORS_ORIGINS
        sync: false

  - type: web
    name: universidad-web
    runtime: static
    plan: free
    buildCommand: cd frontend && npm ci && npm run build
    staticPublishPath: ./frontend/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE_URL
        sync: false
